<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Sign in</title>
<link rel="stylesheet" href="../_shared/theme.css" />
<style>
  /* Pixel-stable capture: lock the document to the scenario viewport. */
  html, body { width: 1280px; height: 800px; overflow: hidden; }
</style>
</head>
<body>
<main class="flex h-full items-center justify-center p-6">
  <div class="flex w-full max-w-[400px] flex-col items-center gap-4">

    <!-- Logo -->
    <div class="flex flex-col items-center gap-2">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m21 7.5-9-5.25L3 7.5m18 0-9 5.25m9-5.25v9l-9 5.25M3 7.5l9 5.25M3 7.5v9l9 5.25m0-9v9"/></svg>
      <p class="text-lg font-bold">Product Inc.</p>
    </div>

    <!-- Card -->
    <div class="w-full space-y-4 rounded-container bg-card p-8 shadow-low">
      <div class="space-y-1 text-center">
        <h2 class="text-xl font-bold">Sign in</h2>
        <p class="text-ink-secondary">Enter your credentials to continue</p>
      </div>

      <div class="space-y-1.5">
        <label for="email" class="font-medium">Email</label>
        <input id="email" type="email" placeholder="you@example.com"
          class="w-full rounded-element border border-edge-strong bg-surface px-3 py-2.5 placeholder:text-ink-disabled" />
      </div>

      <div class="space-y-1.5">
        <label for="password" class="font-medium">Password</label>
        <input id="password" type="password" placeholder="Enter your password"
          class="w-full rounded-element border border-edge-strong bg-surface px-3 py-2.5 placeholder:text-ink-disabled" />
      </div>

      <button class="w-full rounded-element bg-accent px-4 py-2.5 font-medium text-on-accent">Sign in</button>
    </div>

  </div>
</main>
</body>
</html>
