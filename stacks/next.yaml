template: stacks/next/template
preamble: >-
  You are working inside an existing Next.js project skeleton (App Router,
  static export) that is already present in your working directory.
  TailwindCSS v4 is pre-installed and wired up through PostCSS:
  `app/globals.css` already contains `@import "tailwindcss";`, so you can use
  Tailwind utility classes directly in any component. A custom Tailwind theme
  is preconfigured in `app/globals.css`, exposing design-token utility classes
  (colors such as `bg-card`, `text-ink`, `border-edge`; radii such as
  `rounded-container`; shadows such as `shadow-med`). Build it with
  `npm run build` and run the server with `npm start`; it serves on port 4200.
install: npm ci --ignore-scripts
build: npm run build
start: npm start
port: 4200
viewport:
  width: 1280
  height: 800
