template: stacks/angular/template
preamble: >-
  You are working inside an existing Angular project skeleton that is already
  present in your working directory. Build it with `npm run build` and run the
  dev server with `npm start`; it serves on port 4200.
install: npm ci --ignore-scripts
build: npm run build
lint: npm run lint
test: npm test
start: npm start
port: 4200
viewport:
  width: 1280
  height: 800
